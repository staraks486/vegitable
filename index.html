<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Farmer's Gate PRO - Fully Calibrated</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        :root { 
            --primary: #10b981; 
            --primary-dark: #059669; 
            --danger: #ef4444;
            --bg: #f8fafc; 
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg); 
            color: #1e293b;
            -webkit-tap-highlight-color: transparent;
            padding-bottom: 20px;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .article-card { 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
            border: 1px solid #e2e8f0; 
            background: white; 
            border-radius: 20px;
        }
        .article-card:active { transform: scale(0.98); }
        .article-card.edit-highlight { 
            border-color: var(--primary) !important; 
            background: #f0fdf4 !important;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        }

        .category-pill { transition: all 0.2s ease; cursor: pointer; border: 1px solid transparent; }
        .category-pill.active { background: var(--primary) !important; color: white !important; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2); }

        .glass-panel { 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(10px); 
            border: 1px solid #e2e8f0;
        }

        .loader { 
            border: 3px solid #f3f3f3; border-top: 3px solid var(--primary); 
            border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .animate-pop { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        
        .duplicate-tag { border: 1px solid #ef4444; background: #fee2e2; color: #b91c1c; }
        
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .mic-active { background: #ef4444 !important; color: white !important; animation: pulse-red 1.5s infinite; }
        @keyframes pulse-red { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body class="p-2 md:p-6">

    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="flex items-center justify-between mb-6 px-2">
            <div class="flex items-center gap-4">
                <button onclick="toggleAddModal()" class="bg-slate-900 text-white p-3 rounded-2xl shadow-xl active:scale-90 transition-transform">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                </button>
                <div>
                    <h1 class="text-2xl font-black tracking-tighter text-slate-900 leading-none">Farmer's <span class="text-emerald-600">Gate</span></h1>
                    <p id="displayLoc" class="text-xs text-slate-400 font-bold uppercase mt-1">Patiala Branch</p>
                </div>
            </div>
            <div class="text-right">
                <div class="flex gap-2 justify-end mb-1">
                    <span id="totalItemsBadge" class="bg-emerald-50 text-emerald-700 px-3 py-1 rounded-full text-[10px] font-black uppercase border border-emerald-100 shadow-sm">Stock: 0</span>
                </div>
                <button onclick="sendInvoice()" class="text-emerald-600 font-black text-xs uppercase tracking-widest hover:text-emerald-700">Send WhatsApp Bill</button>
            </div>
        </header>

        <!-- Search & Quick Filters -->
        <div class="grid grid-cols-1 md:grid-cols-12 gap-3 mb-6">
            <div class="md:col-span-8 flex gap-2">
                <div class="relative flex-1">
                    <input type="text" id="searchInput" oninput="handleSearch()" placeholder="Search items..." class="w-full pl-12 pr-4 py-4 bg-white border border-slate-200 rounded-2xl text-sm font-bold outline-none focus:ring-4 focus:ring-emerald-500/10 focus:border-emerald-500 transition-all shadow-sm">
                    <svg class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                </div>
                <button onclick="toggleVoiceBilling()" id="voiceBtn" class="bg-white border border-slate-200 text-slate-500 px-5 rounded-2xl shadow-sm active:scale-90 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
                </button>
            </div>
            <div class="md:col-span-4 flex gap-2">
                <button onclick="setActiveCategory('Vegetable', this)" class="category-pill active flex-1 py-2 rounded-2xl text-[11px] font-black uppercase tracking-widest bg-white border border-slate-100 text-slate-400">Veg</button>
                <button onclick="setActiveCategory('Fruit', this)" class="category-pill flex-1 py-2 rounded-2xl text-[11px] font-black uppercase tracking-widest bg-white border border-slate-100 text-slate-400">Fruit</button>
                <button onclick="setActiveCategory('Grocery', this)" class="category-pill flex-1 py-2 rounded-2xl text-[11px] font-black uppercase tracking-widest bg-white border border-slate-100 text-slate-400">Groc</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 items-start">
            <!-- Left Workspace -->
            <div class="lg:col-span-7 space-y-4">
                <div class="flex justify-between items-center px-2">
                    <h2 id="categoryTitle" class="text-xs font-black text-slate-400 uppercase tracking-[0.2em]">Master Stock</h2>
                    <span id="itemCount" class="text-[10px] font-bold text-emerald-600 bg-emerald-50 px-3 py-1 rounded-full">0 Articles</span>
                </div>
                <div id="itemGrid" class="grid grid-cols-1 sm:grid-cols-2 gap-3 max-h-[75vh] overflow-y-auto pr-2 custom-scrollbar pb-10"></div>
            </div>

            <!-- Right Workspace (Bill) -->
            <div class="lg:col-span-5 sticky top-6">
                <div class="glass-panel rounded-[2.5rem] p-6 shadow-2xl border-t-8 border-t-slate-900 min-h-[500px] flex flex-col">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-sm font-black text-slate-800 uppercase tracking-widest">Active Order</h2>
                        <button onclick="clearCart()" class="text-slate-300 hover:text-red-500 active:scale-90 transition-all p-2"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg></button>
                    </div>

                    <div id="cartItems" class="space-y-2 flex-1 max-h-[45vh] overflow-y-auto pr-2 custom-scrollbar"></div>

                    <div class="mt-6 pt-6 border-t border-slate-200">
                        <div class="flex justify-between items-end mb-6">
                            <div>
                                <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-1">Grand Total</p>
                                <div id="grandTotal" class="text-5xl font-black text-emerald-600 tracking-tighter tabular-nums">₹0.00</div>
                            </div>
                        </div>
                        <button onclick="sendInvoice()" class="w-full bg-slate-900 text-white py-5 rounded-3xl font-black text-sm uppercase tracking-[0.1em] shadow-xl active:scale-[0.98] transition-all flex items-center justify-center gap-3">
                            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
                            Finalize Bill
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Stock Hub Modal -->
    <div id="addModal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-md hidden flex items-center justify-center p-4 z-[100] overflow-y-auto">
        <div class="bg-white rounded-[3rem] w-full max-w-2xl p-8 shadow-2xl flex flex-col my-auto max-h-[95vh]">
            <div class="flex justify-between items-center mb-6 flex-shrink-0">
                <h3 class="text-xl font-black text-slate-900 uppercase tracking-tighter">Stock Hub</h3>
                <button onclick="toggleAddModal()" class="bg-slate-100 p-3 rounded-full text-slate-400 active:scale-90 transition-all"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
            </div>

            <div class="space-y-6 overflow-y-auto custom-scrollbar pr-2 pb-4">
                <!-- Location Setting -->
                <div class="bg-slate-50 p-6 rounded-[2rem] space-y-4">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Branch Identity</p>
                    <div class="flex gap-3">
                        <input type="text" id="editLoc" placeholder="Branch Name" class="flex-1 px-5 py-4 bg-white border border-slate-200 rounded-2xl text-sm font-bold outline-none focus:ring-4 focus:ring-emerald-500/10">
                        <button onclick="updateSettings()" class="bg-slate-900 text-white px-8 rounded-2xl font-bold text-xs uppercase shadow-lg">Set</button>
                    </div>
                </div>

                <!-- Google Sheet Sync -->
                <div class="bg-emerald-50 border border-emerald-100 p-6 rounded-[2rem] space-y-4">
                    <p class="text-[10px] font-black text-emerald-700 uppercase tracking-widest">Google Sheet Integration</p>
                    <div class="flex gap-3">
                        <input type="text" id="sheetUrl" placeholder="Paste Public Sheet Link..." class="flex-1 px-5 py-4 bg-white border border-emerald-200 rounded-2xl text-sm font-bold outline-none">
                        <button onclick="syncFromSheet()" class="bg-emerald-600 text-white px-6 rounded-2xl font-bold text-xs uppercase">Sync</button>
                    </div>
                </div>

                <!-- Scanning Buttons -->
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="document.getElementById('cameraInput').click()" class="bg-blue-50 text-blue-700 p-5 rounded-[2rem] flex flex-col items-center gap-2 border border-blue-100 active:scale-95 transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
                        <span class="text-[10px] font-black uppercase tracking-widest">Camera</span>
                        <input type="file" id="cameraInput" accept="image/*" capture="environment" class="hidden" onchange="handleImageInput(event)">
                    </button>
                    <button onclick="document.getElementById('galleryInput').click()" class="bg-emerald-50 text-emerald-700 p-5 rounded-[2rem] flex flex-col items-center gap-2 border border-emerald-100 active:scale-95 transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
                        <span class="text-[10px] font-black uppercase tracking-widest">Gallery Scan</span>
                        <input type="file" id="galleryInput" accept="image/*" class="hidden" multiple onchange="handleImageInput(event)">
                    </button>
                </div>

                <div id="smartLoader" class="hidden flex items-center gap-4 p-5 bg-slate-900 text-white rounded-[2rem] shadow-xl">
                    <div class="loader !border-emerald-400 !border-t-transparent w-5 h-5"></div>
                    <span id="loaderText" class="text-xs font-black uppercase tracking-widest">AI Stock Calibration...</span>
                </div>

                <!-- Setup Form -->
                <div class="bg-white border border-slate-200 p-6 rounded-[2.5rem] shadow-sm space-y-4">
                    <p id="formTitle" class="text-[11px] font-black text-emerald-600 uppercase tracking-widest">Manual Stock Entry</p>
                    <div class="flex gap-2 bg-slate-50 p-1.5 rounded-2xl h-[55px]">
                        <button onclick="setMCat('Vegetable')" id="mcVeg" class="mcat flex-1 rounded-xl bg-emerald-600 text-white text-[11px] font-extrabold uppercase py-3 transition-all shadow-md">Veg</button>
                        <button onclick="setMCat('Fruit')" id="mcFruit" class="mcat flex-1 rounded-xl bg-white text-slate-400 text-[11px] font-extrabold uppercase py-3 transition-all">Fruit</button>
                        <button onclick="setMCat('Grocery')" id="mcGroc" class="mcat flex-1 rounded-xl bg-white text-slate-400 text-[11px] font-extrabold uppercase py-3 transition-all">Groc</button>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <input type="text" id="newName" placeholder="English Name" class="p-4 bg-slate-50 border-0 rounded-2xl text-sm font-bold outline-none">
                        <input type="text" id="newHindi" placeholder="हिंदी नाम" class="p-4 bg-slate-50 border-0 rounded-2xl text-sm font-bold outline-none">
                    </div>
                    <div class="bg-slate-50 p-5 rounded-[2rem] space-y-4">
                        <div class="flex gap-3 items-center">
                            <input type="number" id="newPrice" placeholder="Price" class="flex-1 p-4 bg-white border border-slate-100 rounded-2xl text-lg font-black outline-none shadow-inner">
                            <span class="text-xs font-black text-slate-300">FOR</span>
                            <div class="flex gap-1.5 items-center bg-white p-1 rounded-2xl border border-slate-100">
                                <input type="number" id="newRefQty" value="1" class="w-14 p-3 bg-transparent text-center font-black text-base outline-none">
                                <select id="newPriceUnit" class="bg-slate-100 border-0 rounded-xl text-[10px] py-3 px-2 font-black uppercase outline-none">
                                    <option value="Kg">Kg</option><option value="Gm">Gm</option><option value="Pcs">Pcs</option><option value="Pkt">Pkt</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <button id="saveBtn" onclick="saveItem()" class="w-full bg-emerald-600 text-white font-black py-5 rounded-[2rem] shadow-xl active:scale-[0.98] transition-all uppercase text-sm tracking-widest">Save to master list</button>
                    <button id="cancelEditBtn" onclick="resetForm()" class="hidden w-full text-xs font-bold text-slate-400 uppercase mt-4 text-center hover:text-red-500">Cancel Edit</button>
                </div>

                <div id="manageList" class="space-y-2 pt-2 border-t border-slate-100"></div>
            </div>
        </div>
    </div>

    <!-- Toast UI -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 px-10 py-4 bg-slate-900 text-white rounded-full shadow-2xl opacity-0 transition-all duration-500 pointer-events-none z-[100] font-bold text-[11px] uppercase tracking-widest flex items-center gap-3">
        <div class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></div>
        <span id="toastMsg">Action Complete</span>
    </div>

    <script>
        const apiKey = "";
        let activeCat = 'Vegetable';
        let manualCat = 'Vegetable';
        let editingId = null;
        let sLoc = localStorage.getItem('fg_loc') || "Patiala Branch";
        let inventory = JSON.parse(localStorage.getItem('fg_inventory')) || [
            { id: 1, name: 'Potato', nameHindi: 'आलू', price: 30, refQty: 1, priceUnit: 'Kg', category: 'Vegetable' },
            { id: 2, name: 'Tomato', nameHindi: 'टमाटर', price: 65, refQty: 1, priceUnit: 'Kg', category: 'Vegetable' },
            { id: 3, name: 'Apple', nameHindi: 'सेब', price: 180, refQty: 1, priceUnit: 'Kg', category: 'Fruit' },
            { id: 4, name: 'Green Chilli', nameHindi: 'हरी मिर्च', price: 40, refQty: 250, priceUnit: 'Gm', category: 'Vegetable' }
        ];
        let cart = {};
        let recognition = null;

        function save() {
            localStorage.setItem('fg_inventory', JSON.stringify(inventory));
            localStorage.setItem('fg_loc', sLoc);
            document.getElementById('totalItemsBadge').innerText = inventory.length;
        }

        function handleSearch() { render(); }
        function setActiveCategory(cat, el) {
            activeCat = cat;
            document.querySelectorAll('.category-pill').forEach(p => p.classList.remove('active'));
            el.classList.add('active');
            render();
        }

        function render() {
            const grid = document.getElementById('itemGrid');
            const q = document.getElementById('searchInput').value.toLowerCase().trim();
            if(!grid) return;
            grid.innerHTML = '';
            const filtered = inventory.filter(i => i.category === activeCat && (i.name.toLowerCase().includes(q) || (i.nameHindi && i.nameHindi.toLowerCase().includes(q)))).sort((a,b) => a.name.localeCompare(b.name));
            document.getElementById('itemCount').innerText = `${filtered.length} Articles`;
            filtered.forEach(item => {
                const card = document.createElement('div');
                card.className = 'article-card p-4 shadow-sm animate-pop';
                card.id = `inv-item-${item.id}`;
                card.innerHTML = `<div class="flex justify-between items-start mb-4"><div class="min-w-0 flex-1 pr-1"><h4 class="font-black text-slate-900 text-[20px] uppercase truncate leading-tight">${item.name}</h4><p class="text-[12px] text-slate-400 font-bold truncate mt-1">${item.nameHindi || ''}</p></div><div class="text-right"><div class="flex items-center justify-end gap-1"><span class="text-xs font-bold text-slate-300">₹</span><input type="number" id="price-${item.id}" value="${item.price}" class="w-12 bg-emerald-50 text-emerald-700 text-lg font-black text-right rounded px-1 shadow-inner outline-none"></div><p class="text-[7px] font-black text-slate-300 uppercase leading-none mt-1">per ${item.refQty}${item.priceUnit}</p></div></div><div class="flex gap-2 h-[50px]"><input type="number" id="qty-${item.id}" placeholder="Qty" class="w-18 bg-slate-50 border-0 rounded-2xl text-base font-black text-center outline-none focus:ring-4 focus:ring-emerald-500/10"><select id="unit-${item.id}" class="flex-1 bg-slate-50 rounded-2xl text-[10px] font-black uppercase outline-none px-2 cursor-pointer"><option value="Kg">Kg</option><option value="Gm" ${item.priceUnit==='Gm'?'selected':''}>Gm</option><option value="Pcs" ${item.priceUnit==='Pcs'?'selected':''}>Pcs</option><option value="Pkt">Pkt</option></select><button onclick="addToCart(${item.id})" class="bg-slate-900 text-white w-12 flex items-center justify-center rounded-2xl active:scale-95 shadow-md"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4"><path d="M12 5v14M5 12h14"/></svg></button></div>`;
                grid.appendChild(card);
            });
            renderCart();
        }

        function addToCart(id, vQty = null) {
            const qi = document.getElementById(`qty-${id}`), us = document.getElementById(`unit-${id}`), pi = document.getElementById(`price-${id}`);
            const qty = vQty || parseFloat(qi?.value || 0), inU = us?.value || "Kg", sP = parseFloat(pi?.value || 0);
            if (isNaN(qty) || qty <= 0) return notify("Enter Weight/Qty");
            const it = inventory.find(i => i.id === id);
            const rQ = it.refQty || 1, rU = it.priceUnit || 'Kg';
            const bRV = (rU === 'Kg') ? rQ * 1000 : rQ;
            const bIV = (inU === 'Kg') ? qty * 1000 : qty;
            const fP = (bIV / bRV) * sP;
            const key = `${id}-${inU}-${sP}-${rQ}-${rU}`; 
            cart[key] = { ...it, qty, totalPrice: fP, unit: inU, basePrice: sP, dSU: rU, dSQ: rQ };
            if (qi) qi.value = '';
            renderCart();
            notify(`${it.name} Added`);
        }

        function renderCart() {
            const list = document.getElementById('cartItems'), totalEl = document.getElementById('grandTotal');
            if(!list) return;
            list.innerHTML = ''; let total = 0;
            Object.entries(cart).forEach(([key, item]) => {
                total += item.totalPrice;
                const el = document.createElement('div');
                el.className = 'flex items-center justify-between p-4 bg-white border border-slate-100 rounded-3xl animate-item shadow-sm';
                el.innerHTML = `<div class="min-w-0 flex-1 pr-3"><p class="font-black text-sm text-slate-800 uppercase truncate">${item.name}</p><p class="text-[9px] text-emerald-600 font-extrabold uppercase mt-1 tracking-tighter">${item.qty}${item.unit} @ ₹${item.basePrice}/${item.dSQ}${item.dSU}</p></div><div class="flex items-center gap-2"><span class="font-black text-base text-slate-900 mr-2 tabular-nums">₹${item.totalPrice.toFixed(2)}</span><button onclick="delete cart['${key}'];renderCart();" class="text-slate-300 hover:text-red-500 p-1 transition-all"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M18 6 6 18M6 6l12 12"/></svg></button></div>`;
                list.appendChild(el);
            });
            totalEl.innerText = `₹${total.toFixed(2)}`;
        }

        async function syncFromSheet() {
            const url = document.getElementById('sheetUrl').value.trim();
            if (!url) return notify("Paste Link First");
            const match = url.match(/spreadsheets\/d\/([a-zA-Z0-9-_]+)/);
            if (!match) return notify("Invalid Link");
            const csvUrl = `https://docs.google.com/spreadsheets/d/${match[1]}/export?format=csv`;
            document.getElementById('smartLoader').classList.remove('hidden');
            try {
                const response = await fetch(csvUrl);
                const data = await response.text();
                const rows = data.split('\n').slice(1);
                rows.forEach(row => {
                    const cols = row.split(',').map(c => c.trim().replace(/^"|"$/g, ''));
                    if (cols.length >= 3) {
                        inventory.push({ id: Date.now() + Math.random(), name: cols[0], nameHindi: cols[1] || "", price: parseFloat(cols[2]) || 0, refQty: parseFloat(cols[3]) || 1, priceUnit: cols[4] || "Kg", category: cols[5] || "Vegetable" });
                    }
                });
                save(); render(); renderManagement(); notify("Synced Successfully");
            } catch (e) { notify("Sync Error"); }
            document.getElementById('smartLoader').classList.add('hidden');
        }

        async function apiCallWithRetry(p, b64 = null, m = "image/jpeg") {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const pts = [{ text: p }]; 
            if(b64) pts.push({ inlineData: { mimeType: m, data: b64 } });
            const body = { contents: [{ role: "user", parts: pts }], generationConfig: { responseMimeType: "application/json" } };
            const delays = [1000, 2000, 4000, 8000, 16000];
            for(let i=0; i<5; i++) {
                try {
                    const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
                    const d = await res.json();
                    return d.candidates[0].content.parts[0].text;
                } catch(e) { await new Promise(r => setTimeout(r, delays[i])); }
            }
            throw new Error("AI Timeout");
        }

        async function handleImageInput(ev) {
            const fs = ev.target.files; if (!fs || fs.length === 0) return;
            const loader = document.getElementById('smartLoader');
            loader.classList.remove('hidden');
            let addedCount = 0;
            for (let i = 0; i < fs.length; i++) {
                try {
                    const b64 = await new Promise(res => {
                        const r = new FileReader();
                        r.onload = e => {
                            const img = new Image();
                            img.onload = () => {
                                const canvas = document.createElement('canvas');
                                const max_size = 1200;
                                let w = img.width, h = img.height;
                                if (w > h) { if (w > max_size) { h *= max_size / w; w = max_size; } }
                                else { if (h > max_size) { w *= max_size / h; h = max_size; } }
                                canvas.width = w; canvas.height = h;
                                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                                res(canvas.toDataURL('image/jpeg', 0.8).split(',')[1]);
                            };
                            img.src = e.target.result;
                        };
                        r.readAsDataURL(fs[i]);
                    });
                    const resText = await apiCallWithRetry("Identify items in image. JSON: { \"articles\": [{ \"name\": \"...\", \"nameHindi\": \"...\", \"price\": 0, \"refQty\": 1, \"priceUnit\": \"Kg/Gm/Pcs\", \"category\": \"Vegetable/Fruit/Grocery\" }] }", b64, "image/jpeg");
                    const cleaned = resText.replace(/```json/g, '').replace(/```/g, '').trim();
                    const d = JSON.parse(cleaned);
                    if(d.articles) { d.articles.forEach(it => { inventory.unshift({id: Date.now()+Math.random(), ...it}); addedCount++; }); }
                } catch (e) { notify("Scan Error"); }
            }
            if(addedCount > 0) { save(); render(); renderManagement(); notify(`${addedCount} Items Added`); }
            loader.classList.add('hidden');
        }

        function toggleAddModal() {
            const m = document.getElementById('addModal'); m.classList.toggle('hidden');
            if(!m.classList.contains('hidden')) {
                const el = document.getElementById('editLoc');
                if(el) el.value = sLoc;
                renderManagement(); resetForm();
            }
        }

        function saveItem() {
            const n = document.getElementById('newName').value.trim(), p = document.getElementById('newPrice').value, r = document.getElementById('newRefQty').value, u = document.getElementById('newPriceUnit').value;
            if(!n || !p || !r) return notify("Missing Details");
            if (editingId) {
                const ix = inventory.findIndex(i => i.id === editingId);
                if (ix > -1) inventory[ix] = { ...inventory[ix], name: n, nameHindi: document.getElementById('newHindi').value, price: parseFloat(p), refQty: parseFloat(r), priceUnit: u, category: manualCat };
                editingId = null;
            } else { inventory.push({id: Date.now(), name: n, nameHindi: document.getElementById('newHindi').value, price: parseFloat(p), refQty: parseFloat(r), priceUnit: u, category: manualCat}); }
            save(); render(); renderManagement(); resetForm(); notify("Stock Saved");
        }

        function resetForm() { editingId = null; document.getElementById('formTitle').innerText = "Manual Setup"; document.getElementById('saveBtn').innerText = "Update Stock"; document.getElementById('cancelEditBtn').classList.add('hidden'); ['newName','newHindi','newPrice'].forEach(id => document.getElementById(id).value = ''); document.getElementById('newRefQty').value = "1"; }
        function editArticle(id) { 
            const it = inventory.find(i => i.id === id); if(!it) return;
            editingId = id; document.getElementById('newName').value = it.name; document.getElementById('newHindi').value = it.nameHindi || ""; document.getElementById('newPrice').value = it.price; document.getElementById('newRefQty').value = it.refQty || "1"; document.getElementById('newPriceUnit').value = it.priceUnit || 'Kg'; 
            setMCat(it.category); document.getElementById('formTitle').innerText = "Editing: " + it.name; document.getElementById('saveBtn').innerText = "Overwrite Stock"; document.getElementById('cancelEditBtn').classList.remove('hidden'); 
        }

        function renderManagement() {
            const div = document.getElementById('manageList'); div.innerHTML = '';
            const counts = {}; inventory.forEach(it => { const low = it.name.toLowerCase().trim(); counts[low] = (counts[low] || 0) + 1; });
            inventory.sort((a,b)=>a.name.localeCompare(b.name)).forEach(it => {
                const isDup = counts[it.name.toLowerCase().trim()] > 1;
                const el = document.createElement('div'); el.className = `flex items-center justify-between p-4 bg-slate-50 border rounded-3xl shadow-sm ${isDup ? 'duplicate-tag' : 'border-slate-100'} mb-2`;
                el.innerHTML = `<div class="min-w-0 flex-1"><div><div class="flex items-center gap-1"><span class="text-[7px] font-black px-1.5 py-0.5 rounded bg-slate-200 text-slate-500 uppercase">${it.category.slice(0,3)}</span><span class="text-[11px] font-bold text-slate-700 truncate uppercase">${it.name}</span>${isDup ? '<span class="text-[7px] font-black px-1 rounded bg-red-600 text-white uppercase tracking-tighter">Dup</span>' : ''}</div><span class="text-[10px] text-emerald-600 font-extrabold">₹${it.price}/${it.refQty}${it.priceUnit}</span></div></div><div class="flex gap-2"><button onclick="editArticle(${it.id})" class="bg-white p-2.5 rounded-2xl border border-slate-100 active:scale-90"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg></button><button onclick="inventory=inventory.filter(i=>i.id!=${it.id});save();renderManagement();render();notify('Deleted')" class="bg-white p-2.5 rounded-2xl border border-slate-100 active:scale-90"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg></button></div>`;
                div.appendChild(el);
            });
        }

        function toggleVoiceBilling() {
            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SR) return notify("No Mic Support");
            if (recognition) { recognition.stop(); recognition = null; document.getElementById('voiceBtn').classList.remove('mic-active'); return; }
            recognition = new SR(); recognition.lang = "en-IN"; recognition.continuous = true;
            recognition.onstart = () => { document.getElementById('voiceBtn').classList.add('mic-active'); notify("Mic Active"); };
            recognition.onresult = (e) => { const txt = e.results[e.results.length-1][0].transcript.toLowerCase(); let matched = inventory.find(i => txt.includes(i.name.toLowerCase())); if(matched) addToCart(matched.id, 1); };
            recognition.onend = () => { document.getElementById('voiceBtn').classList.remove('mic-active'); recognition = null; };
            recognition.start();
        }

        function setMCat(cat) { manualCat = cat; document.querySelectorAll('.mcat').forEach(b => b.className = 'mcat flex-1 rounded-xl bg-white text-slate-400 text-[10px] font-extrabold uppercase py-3 transition-all'); const b = cat==='Vegetable'?'mcVeg':cat==='Fruit'?'mcFruit':'mcGroc'; if(document.getElementById(b)) document.getElementById(b).className = 'mcat flex-1 rounded-xl bg-emerald-600 text-white text-[10px] font-extrabold uppercase py-3 shadow-md'; }
        function updateSettings() { sLoc = document.getElementById('editLoc').value || "Main Branch"; document.getElementById('displayLoc').innerText = sLoc; save(); notify("Identity Saved"); }
        function clearCart() { cart = {}; renderCart(); notify("Order Reset"); }
        function sendInvoice() {
            const items = Object.values(cart); if(items.length===0) return notify("Empty");
            let msg = `🛒 *FARMER'S GATE - BILL*\n📍 _${sLoc}_\n--------------------\n`;
            items.forEach(i => msg += `✅ *${i.name}*\n   ${i.qty}${i.unit} @ ₹${i.basePrice}/${i.dSQ}${i.dSU} = *₹${i.totalPrice.toFixed(2)}*\n`);
            msg += `--------------------\n💰 *TOTAL: ₹${document.getElementById('grandTotal').innerText}*`;
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
        }
        function notify(m) { const t = document.getElementById('toast'); document.getElementById('toastMsg').innerText = m; t.style.opacity = '1'; setTimeout(() => t.style.opacity = '0', 2500); }

        window.onload = () => { document.getElementById('displayLoc').innerText = sLoc; render(); save(); };
    </script>
</body>
